<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isidro Cabrera · Asesoría</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230B0F19'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232ECC71' font-family='Arial' font-weight='bold'>IC</text></svg>">
    
    <meta property="og:title" content="Isidro Cabrera · Asesoría de Crédito">
    <meta property="og:description" content="Evaluación de perfil y simulación de cuotas online.">
    <meta property="og:image" content="https://tking-asesor.github.io/creditos/preview.jpg">
    <meta property="og:type" content="website">

    <style>
        :root { --bg: #0B0F19; --accent: #2ECC71; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 40px 20px; max-width: 400px; width: 100%; border: 1px solid rgba(255,255,255,0.08); }
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn-green { background: var(--accent); color: var(--bg); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--white); }
        .oculto { display: none; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <div id="filterSection">
            <h2>¿Cómo está su historial crediticio?</h2>
            <button class="btn btn-green" onclick="next()">Limpio / Sin deudas</button>
            <button class="btn btn-outline" onclick="blockUser()">Tengo deudas pendientes</button>
        </div>
        <div id="blockedMessage" class="oculto">
            <h2 style="color: #ff4d4d;">Acceso Restringido</h2>
            <p>Lamentablemente no cumple con los requisitos mínimos para este producto.</p>
        </div>
    </div>

    <script>
        // Si el usuario ya fue bloqueado antes, no le mostramos el filtro
        if(localStorage.getItem('ic_blocked') === 'true') {
            document.getElementById('filterSection').classList.add('oculto');
            document.getElementById('blockedMessage').classList.remove('oculto');
        }

        function next() { window.location.href = 'app.html'; }

        function blockUser() {
            localStorage.setItem('ic_blocked', 'true');
            document.getElementById('filterSection').classList.add('oculto');
            document.getElementById('blockedMessage').classList.remove('oculto');
        }
    </script>
</body>
</html>
