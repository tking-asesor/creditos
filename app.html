<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isidro Cabrera · Asesoría de Crédito</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230B0F19'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232ECC71' font-family='Arial' font-weight='bold'>IC</text></svg>">
    
    <style>
        :root {
            --bg-deep: #0B0F19; --accent-gold: #2ECC71; --white: #ffffff;
            --whatsapp: #25D366; --error: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background: var(--bg-deep);
            min-height: 100vh; padding: 15px;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .container { width: 100%; max-width: 500px; }

        /* Tarjeta con efecto Glassmorphism */
        .app-card {
            background: rgba(255,255,255,0.03); border-radius: 30px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); margin-bottom: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 35px 20px; text-align: center;
            border-bottom: 1px solid rgba(46, 204, 113, 0.2);
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; color: var(--white); }
        .logo span { color: var(--accent-gold); }
        .agent-badge { margin-top: 15px; font-size: 11px; background: rgba(46, 204, 113, 0.1); padding: 8px 15px; border-radius: 50px; color: var(--accent-gold); display: inline-block; border: 1px solid rgba(46, 204, 113, 0.2); }

        .content { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 10px; font-weight: 800; margin-bottom: 6px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: var(--white); font-size: 15px; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent-gold); outline: none; background: rgba(255,255,255,0.08); }
        option { background: #1A1D2E; color: white; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn { width: 100%; padding: 18px; border-radius: 15px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: rgba(46, 204, 113, 0.15); color: var(--accent-gold); border: 1px solid rgba(46, 204, 113, 0.3); }
        .btn-primary:hover { background: rgba(46, 204, 113, 0.25); }
        .btn-whatsapp { background: var(--whatsapp); color: white; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .btn-back { background: transparent; color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 15px; }

        /* Tabla de Cuotas */
        .table-container { overflow-x: auto; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
        th { background: rgba(46, 204, 113, 0.1); padding: 15px; color: var(--accent-gold); text-transform: uppercase; font-size: 9px; }
        td { padding: 15px; text-align: center; color: white; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; }
        td.selected { background: var(--accent-gold); color: var(--bg-deep); font-weight: 800; }

        .step-content { display: none; }
        .step-content.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Checklist */
        .checklist-container { background: rgba(46, 204, 113, 0.03); border: 1px solid rgba(46, 204, 113, 0.2); border-radius: 18px; padding: 20px; margin-top: 15px; }
        .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: rgba(255,255,255,0.8); }
        .check-item input { width: 20px; height: 20px; accent-color: var(--accent-gold); cursor: pointer; }
        
        .alert-box { background: rgba(46, 204, 113, 0.1); border: 1px dashed var(--accent-gold); border-radius: 15px; padding: 15px; font-size: 12px; color: var(--accent-gold); line-height: 1.5; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header">
                <div class="logo">ISIDRO <span>CABRERA</span></div>
                <div class="agent-badge">ASESORÍA FINANCIERA PROFESIONAL</div>
            </div>

            <div class="content">
                <div class="step-content active" id="step1">
                    <label>¿Qué monto desea simular?</label>
                    <select id="montoSimulador" onchange="actualizarTabla()">
                        <option value="">Seleccione Monto Gs.</option>
                        <option value="1000000">1.000.000 Gs</option>
                        <option value="2000000">2.000.000 Gs</option>
                        <option value="3000000">3.000.000 Gs</option>
                        <option value="4000000">4.000.000 Gs</option>
                        <option value="5000000">5.000.000 Gs</option>
                    </select>

                    <div class="table-container" id="tablaCont" style="display:none;">
                        <table>
                            <thead><tr><th>6 cuotas</th><th>8 cuotas</th><th>10 cuotas</th><th>12 cuotas</th><th>15 cuotas</th><th>18 cuotas</th><th>20 cuotas</th><th>24 cuotas</th></tr></thead>
                            <tbody id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                    <div id="resultadoSim" style="display:none; text-align:center; margin-top:25px;">
                        <p style="font-size: 12px; opacity: 0.5; margin-bottom: 5px;">CUOTA SELECCIONADA</p>
                        <h2 id="txtCuota" style="color:var(--accent-gold); font-size:28px; margin-bottom:20px;"></h2>
                        <button class="btn btn-primary" onclick="irA(2)">SOLICITAR ESTE CRÉDITO</button>
                    </div>
                </div>

                <div class="step-content" id="step2">
                    <div class="form-group"><label>Nombre y Apellido Completos</label><input type="text" id="nombre" placeholder="Nombre completo"></div>
                    <div class="row-2">
                        <div class="form-group"><label>CI N°</label><input type="text" id="ci" class="format-mil" placeholder="1.234.567"></div>
                        <div class="form-group"><label>WhatsApp</label><input type="tel" id="tel" placeholder="09xx xxx xxx"></div>
                    </div>
                    <div class="form-group"><label>Ingreso Mensual (Gs)</label><input type="text" id="ingreso" class="format-mil" placeholder="Gs."></div>
                    
                    <button class="btn btn-primary" onclick="validarPaso2()">CONTINUAR EVALUACIÓN</button>
                    <button class="btn btn-back" onclick="irA(1)">← Volver al simulador</button>
                </div>

                <div class="step-content" id="step3">
                    <div class="form-group">
                        <label>Perfil Laboral</label>
                        <select id="perfil" onchange="cargarPerfil()">
                            <option value="">Seleccione su perfil...</option>
                            <option value="formal_ips">Trabajador Formal (IPS)</option>
                            <option value="formal_iva">Trabajador Formal (IVA)</option>
                            <option value="informal">Trabajador Informal (Sin IPS)</option>
                            <option value="publico_perm">Funcionario Público Permanente</option>
                            <option value="publico_cont">Funcionario Público Contratado</option>
                            <option value="micro_iva">Microempresa con IVA</option>
                            <option value="micro_patente">Microempresa con Patente</option>
                            <option value="micro_sin_patente">Microempresa sin Patente</option>
                            <option value="prof_independiente">Profesional Independiente</option>
                        </select>
                    </div>

                    <div id="seccionLab" style="display:none;">
                        <div class="form-group"><label id="labelRazon">Empresa / Razón Social</label><input type="text" id="razonSocial"></div>
                        <label>Ubicación Laboral</label>
                        <div class="form-group"><input type="text" id="labCalle" placeholder="Calle"></div>
                        <div class="row-2">
                            <input type="text" id="labNum" placeholder="N°">
                            <input type="text" id="labBarrio" placeholder="Barrio">
                        </div>
                    </div>

                    <div id="checklistCont" class="checklist-container" style="display:none;">
                        <label style="color:var(--accent-gold); margin-bottom:10px; display:block;">DOCUMENTOS QUE POSEE:</label>
                        <div id="listaDocs"></div>
                    </div>

                    <button class="btn btn-primary" onclick="validarPaso3()" style="margin-top:20px;">SIGUIENTE PASO</button>
                    <button class="btn btn-back" onclick="irA(2)">← Volver a mis datos</button>
                </div>

                <div class="step-content" id="step4">
                    <div class="form-group">
                        <label>Ciudad de Residencia</label>
                        <select id="ciudadSel" onchange="otroC()">
                            <option value="Pedro Juan Caballero (PJC)">Pedro Juan Caballero (PJC)</option>
                            <option value="Asunción">Asunción</option>
                            <option value="Ciudad del Este">Ciudad del Este</option>
                            <option value="Encarnación">Encarnación</option>
                            <option value="OTRA">OTRA CIUDAD...</option>
                        </select>
                        <input type="text" id="otraCiudad" style="display:none; margin-top:10px;" placeholder="Escriba su ciudad">
                    </div>

                    <label>Dirección Particular (Casa)</label>
                    <div class="form-group"><input type="text" id="casaCalle" placeholder="Calle"></div>
                    <div class="row-2">
                        <input type="text" id="casaNum" placeholder="N°">
                        <input type="text" id="casaBarrio" placeholder="Barrio">
                    </div>

                    <label style="margin-top:20px; display:block;">Referencias (Nombre, Apellido y Celular)</label>
                    <div class="form-group"><input type="text" id="ref1" placeholder="Referencia 1 (Familiar)"></div>
                    <div class="form-group"><input type="text" id="ref2" placeholder="Referencia 2 (Personal)"></div>
                    <div class="form-group"><input type="text" id="ref3" placeholder="Referencia 3 (Personal/Laboral)"></div>

                    <div class="alert-box">
                        📌 <b>AVISO IMPORTANTE:</b> Tenga listos los documentos marcados. Al finalizar, deberá proveer su <b>ubicación GPS</b> cuando el asesor lo solicite vía WhatsApp.
                    </div>

                    <button class="btn btn-whatsapp" onclick="enviarFinal()">ENVIAR EVALUACIÓN COMPLETA</button>
                    <button class="btn btn-back" onclick="irA(3)">← Volver al perfil</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WA_NUM = "595992271485";
        const G_URL = "TU_URL_DE_APPS_SCRIPT";

        const REQUISITOS_ORIGINALES = {
            formal_ips: ["Antigüedad: 6 meses aportes IPS", "Liquidación de salario"],
            formal_iva: ["Antigüedad: 6 meses con IVAs", "6 últimos IVAs", "6 facturas emitidas"],
            informal: ["Antigüedad: 6 meses mínimo", "Certificado de trabajo o RUC"],
            publico_permanente: ["Antigüedad: 1 mes", "Cédula vigente"],
            publico_contratado: ["Antigüedad: 15 meses", "Cédula vigente"],
            micro_iva: ["Antigüedad: 18 meses", "6 últimos IVAs", "Fotos negocio"],
            micro_patente: ["Antigüedad: 18 meses", "Patente actual", "6 últimos IVAs", "Fotos negocio"],
            micro_sin_patente: ["Antigüedad: 24 meses", "Fotos negocio", "Fotos mercadería"],
            prof_independiente: ["Antigüedad: 12 meses", "Título o Registro", "6 últimos IVAs"]
        };

        const CUOTERO = {
            1000000: [235000, 182000, 150000, 127000, 112000, 101000, 96000, 90000],
            2000000: [465000, 358000, 292500, 254000, 223000, 201000, 191000, 177000],
            3000000: [685000, 535000, 435000, 380000, 334000, 302000, 287000, 266000],
            4000000: [900000, 700000, 571000, 507000, 445000, 402000, 382000, 354000],
            5000000: [1150000, 885000, 712000, 633000, 555000, 503000, 478000, 443000]
        };

        let seleccion = { m:0, c:0, p:0 };

        // Formateador de puntos mil
        document.querySelectorAll('.format-mil').forEach(i => {
            i.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, "");
                e.target.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            });
        });

        function actualizarTabla() {
            const m = document.getElementById('montoSimulador').value;
            if(!m) return;
            document.getElementById('tablaCont').style.display = 'block';
            const cuotas = CUOTERO[m];
            const plazos = [6, 8, 10, 12, 15, 18, 20, 24];
            let html = "<tr>";
            cuotas.forEach((c, i) => html += `<td onclick="selC(this, '${m}', '${c}', '${plazos[i]}')">${parseInt(c).toLocaleString()}</td>`);
            document.getElementById('cuerpoTabla').innerHTML = html + "</tr>";
        }

        function selC(el, m, c, p) {
            document.querySelectorAll('td').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            seleccion = { m, c, p };
            document.getElementById('txtCuota').innerText = `${p} cuotas de ${parseInt(c).toLocaleString()} Gs.`;
            document.getElementById('resultadoSim').style.display = 'block';
        }

        function irA(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function validarPaso2() {
            if(document.getElementById('nombre').value.length < 5 || document.getElementById('ci').value.length < 5) { alert("Complete sus datos personales."); return; }
            irA(3);
        }

        function cargarPerfil() {
            const p = document.getElementById('perfil').value;
            const check = document.getElementById('checklistCont');
            const lab = document.getElementById('seccionLab');
            if(!p) { check.style.display='none'; lab.style.display='none'; return; }
            check.style.display='block'; lab.style.display='block';
            document.getElementById('listaDocs').innerHTML = REQUISITOS_ORIGINALES[p].map(r => `<div class="check-item"><input type="checkbox" class="doc-check" value="${r}"> ${r}</div>`).join('');
        }

        function otroC() { document.getElementById('otraCiudad').style.display = (document.getElementById('ciudadSel').value === 'OTRA') ? 'block' : 'none'; }

        function validarPaso3() {
            if(!document.getElementById('perfil').value || !document.getElementById('razonSocial').value) { alert("Complete los datos de su lugar de trabajo."); return; }
            irA(4);
        }

        function enviarFinal() {
            const ciudad = (document.getElementById('ciudadSel').value === 'OTRA') ? document.getElementById('otraCiudad').value : document.getElementById('ciudadSel').value;
            const tiene = Array.from(document.querySelectorAll('.doc-check:checked')).map(c => c.value);
            const falta = Array.from(document.querySelectorAll('.doc-check:not(:checked)')).map(c => c.value);
            
            const data = {
                nombre: document.getElementById('nombre').value,
                ci: document.getElementById('ci').value,
                whatsapp: document.getElementById('tel').value,
                ingreso: document.getElementById('ingreso').value,
                perfil: document.getElementById('perfil').options[document.getElementById('perfil').selectedIndex].text,
                empresa: document.getElementById('razonSocial').value,
                dir_lab: `${document.getElementById('labCalle').value} ${document.getElementById('labNum').value}, ${document.getElementById('labBarrio').value}`,
                ciudad: ciudad,
                dir_casa: `${document.getElementById('casaCalle').value} ${document.getElementById('casaNum').value}, ${document.getElementById('casaBarrio').value}`,
                referencias: `1. ${document.getElementById('ref1').value} | 2. ${document.getElementById('ref2').value} | 3. ${document.getElementById('ref3').value}`,
                cuota: `${seleccion.p} cuotas de ${parseInt(seleccion.c).toLocaleString()} Gs.`,
                tiene: tiene.join(", "),
                falta: falta.join(", ")
            };

            if(!data.dir_casa || !document.getElementById('ref3').value) { alert("Complete las referencias y su dirección de casa."); return; }

            // Enviar a Google Sheet
            fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            // Mensaje WhatsApp Detallado
            const msg = `*NUEVA SOLICITUD DE CRÉDITO*\n\n` +
                        `*CLIENTE:* ${data.nombre}\n*CI:* ${data.ci}\n*TEL:* ${data.whatsapp}\n*INGRESO:* ${data.ingreso} Gs\n` +
                        `*PERFIL:* ${data.perfil}\n*EMPRESA:* ${data.empresa}\n*DIR. LABORAL:* ${data.dir_lab}\n` +
                        `*CIUDAD:* ${data.ciudad}\n*DIR. CASA:* ${data.dir_casa}\n\n` +
                        `*SIMULACIÓN:* ${data.cuota}\n\n` +
                        `*✅ TIENE:* ${data.tiene || 'Ninguno'}\n*❌ FALTA:* ${data.falta || 'Ninguno'}\n\n` +
                        `*REFS:* ${data.referencias}`;

            window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        }
    </script>
</body>
</html>
