<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isidro Cabrera · Asesoría de Crédito</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230B0F19'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232ECC71' font-family='Arial' font-weight='bold'>IC</text></svg>">
    <style>
        :root { --bg-deep: #0B0F19; --accent-gold: #2ECC71; --white: #ffffff; --whatsapp: #25D366; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-deep); color: var(--white); padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .app-card { background: rgba(255,255,255,0.02); border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(46, 204, 113, 0.4); }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: var(--accent-gold); }
        .content { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 5px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 14px; background: #1A1D2E; color: white; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: rgba(46, 204, 113, 0.15); color: var(--accent-gold); border: 1px solid rgba(46, 204, 113, 0.3); }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .checklist-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(46, 204, 113, 0.2); }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 8px; color: #ccc; }
        .check-item input { width: 18px; height: 18px; accent-color: var(--accent-gold); }
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 550px; }
        th { background: rgba(46, 204, 113, 0.1); padding: 10px; color: var(--accent-gold); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        td.selected { background: var(--accent-gold); color: var(--bg-deep); font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header"><div class="logo">ISIDRO <span>CABRERA</span></div></div>
            <div class="content">
                <div class="step-content active" id="step1">
                    <label>Monto a Simular (Gs.)</label>
                    <select id="montoSimulador" onchange="actualizarTabla()">
                        <option value="">Seleccione...</option>
                        <option value="1000000">1.000.000 Gs</option>
                        <option value="2000000">2.000.000 Gs</option>
                        <option value="3000000">3.000.000 Gs</option>
                        <option value="4000000">4.000.000 Gs</option>
                        <option value="5000000">5.000.000 Gs</option>
                    </select>
                    <div class="table-container" id="tablaCont" style="display:none;">
                        <table>
                            <thead><tr><th>6 cuot.</th><th>8 cuot.</th><th>10 cuot.</th><th>12 cuot.</th><th>15 cuot.</th><th>18 cuot.</th><th>20 cuot.</th><th>24 cuot.</th></tr></thead>
                            <tbody id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                    <div id="resultadoSim" style="display:none; text-align:center; margin-top:20px;">
                        <h3 id="txtCuota" style="color:var(--accent-gold); margin-bottom:15px;"></h3>
                        <button class="btn btn-primary" onclick="irA(2)">CONTINUAR</button>
                    </div>
                </div>

                <div class="step-content" id="step2">
                    <div class="form-group"><label>Nombre y Apellido Completos</label><input type="text" id="nombre"></div>
                    <div class="row-2">
                        <div class="form-group"><label>CI N°</label><input type="text" id="ci" class="format-mil"></div>
                        <div class="form-group"><label>WhatsApp</label><input type="tel" id="tel"></div>
                    </div>
                    <div class="form-group"><label>Ingreso Mensual</label><input type="text" id="ingreso" class="format-mil"></div>
                    <div class="form-group">
                        <label>Perfil Laboral</label>
                        <select id="perfil" onchange="actualizarPerfiles()">
                            <option value="">Seleccione...</option>
                            <option value="formal_ips">Trabajador Formal (con IPS)</option>
                            <option value="formal_iva">Trabajador Formal (con IVA)</option>
                            <option value="informal">Trabajador Informal (sin IPS)</option>
                            <option value="publico_permanente">Funcionario Público Permanente</option>
                            <option value="publico_contratado">Funcionario Público Contratado</option>
                            <option value="micro_iva">Microempresa con IVA</option>
                            <option value="micro_patente">Microempresa con Patente</option>
                            <option value="micro_sin_patente">Microempresa sin Patente</option>
                            <option value="prof_independiente">Profesional Independiente</option>
                        </select>
                    </div>
                    <div id="seccionLaboral" style="display:none;">
                        <div class="form-group"><label>Empresa / Razón Social</label><input type="text" id="razonSocial"></div>
                        <label>Dirección Laboral</label>
                        <div class="form-group"><input type="text" id="labCalle" placeholder="Calle"></div>
                        <div class="row-2">
                            <input type="text" id="labNum" placeholder="N°">
                            <input type="text" id="labBarrio" placeholder="Barrio">
                        </div>
                    </div>
                    <div id="checklistCont" class="checklist-box" style="display:none;">
                        <label style="color:var(--accent-gold); margin-bottom:10px; display:block;">DOCUMENTOS QUE POSEE:</label>
                        <div id="listaCheck"></div>
                    </div>
                    <button class="btn btn-primary" onclick="irA(3)">SIGUIENTE</button>
                    <button class="btn" style="color:gray; font-size:12px;" onclick="irA(1)">Volver</button>
                </div>

                <div class="step-content" id="step3">
                    <div class="form-group">
                        <label>Ciudad</label>
                        <select id="ciudadSel" onchange="checkOtra()">
                            <option value="Pedro Juan Caballero (PJC)">Pedro Juan Caballero (PJC)</option>
                            <option value="Asunción">Asunción</option>
                            <option value="Ciudad del Este">Ciudad del Este</option>
                            <option value="Encarnación">Encarnación</option>
                            <option value="OTRA">OTRA CIUDAD</option>
                        </select>
                        <input type="text" id="otraCiudad" style="display:none; margin-top:10px;" placeholder="Escriba su ciudad">
                    </div>
                    <label>Dirección Particular</label>
                    <div class="form-group"><input type="text" id="casaCalle" placeholder="Calle"></div>
                    <div class="row-2">
                        <input type="text" id="casaNum" placeholder="N°">
                        <input type="text" id="casaBarrio" placeholder="Barrio">
                    </div>
                    <label style="margin-top:20px; display:block;">Referencias (Nombre, Apellido y Celular)</label>
                    <input type="text" id="ref1" placeholder="Referencia 1 (Familiar)" style="margin-bottom:10px;">
                    <input type="text" id="ref2" placeholder="Referencia 2 (Personal)" style="margin-bottom:10px;">
                    <input type="text" id="ref3" placeholder="Referencia 3 (Personal/Laboral)">
                    
                    <p style="font-size:11px; color:var(--accent-gold); margin-top:20px; text-align:center; border: 1px dashed var(--accent-gold); padding:10px; border-radius:10px;">
                        ⚠️ Tenga listos sus documentos y ubicación GPS para enviar por WhatsApp cuando se le solicite.
                    </p>
                    <button class="btn btn-whatsapp" onclick="enviar()">ENVIAR SOLICITUD COMPLETA</button>
                    <button class="btn" style="color:gray; font-size:12px;" onclick="irA(2)">Volver</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WA_NUM = "595992271485";
        const G_URL = "TU_URL_DE_APPS_SCRIPT";
        const REQUISITOS = {
            formal_ips: ["Antigüedad: 6 meses aportes IPS", "Liquidación de salario"],
            formal_iva: ["Antigüedad: 6 meses con IVAs", "6 últimos IVAs", "6 facturas emitidas"],
            informal: ["Antigüedad: 6 meses mínimo", "Certificado de trabajo o RUC"],
            publico_permanente: ["Antigüedad: 1 mes", "Cédula vigente"],
            publico_contratado: ["Antigüedad: 15 meses", "Cédula vigente"],
            micro_iva: ["Antigüedad: 18 meses", "6 últimos IVAs", "Fotos negocio"],
            micro_patente: ["Antigüedad: 18 meses", "Patente actual", "6 últimos IVAs", "Fotos negocio"],
            micro_sin_patente: ["Antigüedad: 24 meses", "Fotos negocio", "Fotos mercadería"],
            prof_independiente: ["Antigüedad: 12 meses", "Título o Registro", "6 últimos IVAs"]
        };
        const CUOTERO = {
            1000000: [235000, 182000, 150000, 127000, 112000, 101000, 96000, 90000],
            2000000: [465000, 358000, 292500, 254000, 223000, 201000, 191000, 177000],
            3000000: [685000, 535000, 435000, 380000, 334000, 302000, 287000, 266000],
            4000000: [900000, 700000, 571000, 507000, 445000, 402000, 382000, 354000],
            5000000: [1150000, 885000, 712000, 633000, 555000, 503000, 478000, 443000]
        };

        let sel = { m:0, c:0, p:0 };

        document.querySelectorAll('.format-mil').forEach(i => {
            i.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, "");
                e.target.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            });
        });

        function actualizarTabla() {
            const m = document.getElementById('montoSimulador').value;
            if(!m) return;
            document.getElementById('tablaCont').style.display = 'block';
            const cuotas = CUOTERO[m];
            const plazos = [6, 8, 10, 12, 15, 18, 20, 24];
            let html = "<tr>";
            cuotas.forEach((c, i) => html += `<td onclick="selC(this, '${m}', '${c}', '${plazos[i]}')">${parseInt(c).toLocaleString()}</td>`);
            document.getElementById('cuerpoTabla').innerHTML = html + "</tr>";
        }

        function selC(el, m, c, p) {
            document.querySelectorAll('td').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            sel = { m, c, p };
            document.getElementById('txtCuota').innerText = `${p} cuotas de ${parseInt(c).toLocaleString()} Gs.`;
            document.getElementById('resultadoSim').style.display = 'block';
        }

        function irA(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function actualizarPerfiles() {
            const p = document.getElementById('perfil').value;
            const check = document.getElementById('checklistCont');
            const lab = document.getElementById('seccionLaboral');
            if(!p) { check.style.display='none'; lab.style.display='none'; return; }
            check.style.display='block'; lab.style.display='block';
            document.getElementById('listaCheck').innerHTML = REQUISITOS[p].map(r => `<div class="check-item"><input type="checkbox" class="doc-check" value="${r}"> ${r}</div>`).join('');
        }

        function checkOtra() { document.getElementById('otraCiudad').style.display = (document.getElementById('ciudadSel').value === 'OTRA') ? 'block' : 'none'; }

        function enviar() {
            const ciudad = (document.getElementById('ciudadSel').value === 'OTRA') ? document.getElementById('otraCiudad').value : document.getElementById('ciudadSel').value;
            const tiene = Array.from(document.querySelectorAll('.doc-check:checked')).map(c => c.value);
            const falta = Array.from(document.querySelectorAll('.doc-check:not(:checked)')).map(c => c.value);
            
            const data = {
                nombre: document.getElementById('nombre').value,
                ci: document.getElementById('ci').value,
                whatsapp: document.getElementById('tel').value,
                ingreso: document.getElementById('ingreso').value,
                perfil: document.getElementById('perfil').value,
                empresa: document.getElementById('razonSocial').value,
                dir_lab: `${document.getElementById('labCalle').value} ${document.getElementById('labNum').value}, ${document.getElementById('labBarrio').value}`,
                ciudad: ciudad,
                dir_casa: `${document.getElementById('casaCalle').value} ${document.getElementById('casaNum').value}, ${document.getElementById('casaBarrio').value}`,
                refs: `${document.getElementById('ref1').value} | ${document.getElementById('ref2').value} | ${document.getElementById('ref3').value}`,
                cuota: `${sel.p} cuotas de ${parseInt(sel.c).toLocaleString()}`,
                tiene: tiene.join(", "),
                falta: falta.join(", ")
            };

            fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            const msg = `*SOLICITUD DE CRÉDITO*\n\n` +
                        `*CLIENTE:* ${data.nombre}\n*CI:* ${data.ci}\n*TEL:* ${data.whatsapp}\n*INGRESO:* ${data.ingreso} Gs\n` +
                        `*PERFIL:* ${data.perfil}\n*EMPRESA:* ${data.empresa}\n*DIR. LABORAL:* ${data.dir_lab}\n` +
                        `*CIUDAD:* ${data.ciudad}\n*DIR. CASA:* ${data.dir_casa}\n\n` +
                        `*SIMULACIÓN:* ${data.cuota}\n\n` +
                        `*✅ TIENE:* ${data.tiene || 'Ninguno'}\n*❌ FALTA:* ${data.falta || 'Ninguno'}\n\n` +
                        `*REFS:* ${data.refs}`;

            window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
