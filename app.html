<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isidro Cabrera · Asesoría de Crédito</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230B0F19'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232ECC71' font-family='Arial' font-weight='bold'>IC</text></svg>">
    
    <style>
        :root {
            --bg-deep: #0B0F19; --accent-gold: #2ECC71; --white: #ffffff;
            --whatsapp: #25D366; --error: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-deep); color: var(--white); padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .app-card { background: rgba(255,255,255,0.02); border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(46, 204, 113, 0.3); }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: var(--accent-gold); }
        
        .content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 5px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; }
        .required { color: var(--error); }

        input, select, textarea { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 14px; background: #1A1D2E; color: white; }
        input:focus { border-color: var(--accent-gold); outline: none; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: rgba(46, 204, 113, 0.15); color: var(--accent-gold); border: 1px solid rgba(46, 204, 113, 0.3); }
        .btn-back { background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 5px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 550px; }
        th { background: rgba(46, 204, 113, 0.1); padding: 10px; color: var(--accent-gold); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        td.selected { background: var(--accent-gold); color: var(--bg-deep); font-weight: 800; }

        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .checklist-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(46, 204, 113, 0.2); }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 8px; color: #ccc; }
        .notice { background: rgba(46, 204, 113, 0.1); padding: 12px; border-radius: 10px; font-size: 11px; color: var(--accent-gold); text-align: center; margin-top: 15px; line-height: 1.4; border: 1px dashed var(--accent-gold); }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header"><div class="logo">ISIDRO <span>CABRERA</span></div></div>
            <div class="content">

                <div class="step-content active" id="step1">
                    <label>Monto a Simular (Gs.)</label>
                    <select id="montoSimulador" onchange="actualizarTabla()">
                        <option value="">Seleccione...</option>
                        <option value="1000000">1.000.000 Gs</option>
                        <option value="2000000">2.000.000 Gs</option>
                        <option value="3000000">3.000.000 Gs</option>
                        <option value="4000000">4.000.000 Gs</option>
                        <option value="5000000">5.000.000 Gs</option>
                    </select>
                    <div class="table-container" id="tablaCont" style="display:none;">
                        <table>
                            <thead><tr><th>6 cuot.</th><th>8 cuot.</th><th>10 cuot.</th><th>12 cuot.</th><th>15 cuot.</th><th>18 cuot.</th><th>20 cuot.</th><th>24 cuot.</th></tr></thead>
                            <tbody id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                    <div id="resultadoSim" style="display:none; text-align:center; margin-top:20px;">
                        <h3 id="txtCuota" style="color:var(--accent-gold); margin-bottom:15px;"></h3>
                        <button class="btn btn-primary" onclick="irA(2)">SIGUIENTE</button>
                    </div>
                </div>

                <div class="step-content" id="step2">
                    <div class="form-group"><label>Nombre y Apellido Completos <span class="required">*</span></label>
                        <input type="text" id="nombre" placeholder="Nombre y Apellido"></div>
                    <div class="row-2">
                        <div class="form-group"><label>CI N° <span class="required">*</span></label>
                            <input type="text" id="ci" class="format-mil" placeholder="1.234.567"></div>
                        <div class="form-group"><label>WhatsApp <span class="required">*</span></label>
                            <input type="tel" id="tel" placeholder="09xx xxx xxx"></div>
                    </div>
                    <div class="form-group"><label>Ingreso Mensual <span class="required">*</span></label>
                        <input type="text" id="ingreso" class="format-mil" placeholder="Gs."></div>
                    
                    <button class="btn btn-primary" onclick="validarPaso2()">CONTINUAR</button>
                    <button class="btn btn-back" onclick="irA(1)">← Volver al simulador</button>
                </div>

                <div class="step-content" id="step3">
                    <div class="form-group"><label>Perfil Laboral <span class="required">*</span></label>
                        <select id="perfil" onchange="mostrarPerfilesOriginales()">
                            <option value="">Seleccioná...</option>
                            <option value="formal_ips">Trabajador Formal (IPS)</option>
                            <option value="formal_iva">Trabajador Formal (IVA)</option>
                            <option value="informal">Trabajador Informal (Sin IPS)</option>
                            <option value="publico_perm">Funcionario Público Permanente</option>
                            <option value="publico_cont">Funcionario Público Contratado</option>
                            <option value="micro_iva">Microempresa con IVA</option>
                            <option value="micro_patente">Microempresa con Patente</option>
                            <option value="micro_sin_pat">Microempresa sin Patente</option>
                            <option value="prof_indep">Profesional Independiente</option>
                        </select>
                    </div>

                    <div id="seccionEmpresa" style="display:none;">
                        <div class="form-group"><label id="labelEmpresa">Nombre de la Empresa / Razón Social <span class="required">*</span></label>
                            <input type="text" id="razonSocial" placeholder="Donde trabaja o factura"></div>
                        <label>Dirección Laboral <span class="required">*</span></label>
                        <div class="form-group"><input type="text" id="labCalle" placeholder="Calle"></div>
                        <div class="row-2">
                            <div class="form-group"><input type="text" id="labNum" placeholder="N°"></div>
                            <div class="form-group"><input type="text" id="labBarrio" placeholder="Barrio"></div>
                        </div>
                    </div>

                    <div id="checklistCont" class="checklist-box" style="display:none;">
                        <label style="color:var(--accent-gold); margin-bottom:10px; display:block;">REQUISITOS (Marcá los que tenés):</label>
                        <div id="listaCheck"></div>
                    </div>

                    <button class="btn btn-primary" onclick="validarPaso3()">SIGUIENTE</button>
                    <button class="btn btn-back" onclick="irA(2)">← Volver a mis datos</button>
                </div>

                <div class="step-content" id="step4">
                    <div class="form-group"><label>Ciudad de Residencia <span class="required">*</span></label>
                        <select id="ciudadSel" onchange="checkOtraCiudad()">
                            <option value="Pedro Juan Caballero (PJC)">Pedro Juan Caballero (PJC)</option>
                            <option value="Asunción">Asunción</option>
                            <option value="Ciudad del Este">Ciudad del Este</option>
                            <option value="Encarnación">Encarnación</option>
                            <option value="Luque">Luque</option>
                            <option value="Capiatá">Capiatá</option>
                            <option value="Lambaré">Lambaré</option>
                            <option value="San Lorenzo">San Lorenzo</option>
                            <option value="OTRA">-- OTRA CIUDAD --</option>
                        </select>
                        <input type="text" id="otraCiudad" placeholder="Escribí tu ciudad" style="display:none; margin-top:10px;">
                    </div>

                    <label>Dirección Particular <span class="required">*</span></label>
                    <div class="form-group"><input type="text" id="casaCalle" placeholder="Calle"></div>
                    <div class="row-2">
                        <div class="form-group"><input type="text" id="casaNum" placeholder="N°"></div>
                        <div class="form-group"><input type="text" id="casaBarrio" placeholder="Barrio"></div>
                    </div>

                    <label>Referencias (3 Obligatorias: Nombre, Apellido y Cel) <span class="required">*</span></label>
                    <div class="form-group"><input type="text" id="ref1" placeholder="Ref 1 (Familiar)"></div>
                    <div class="form-group"><input type="text" id="ref2" placeholder="Ref 2 (Personal)"></div>
                    <div class="form-group"><input type="text" id="ref3" placeholder="Ref 3 (Laboral/Personal)"></div>

                    <div class="notice">
                        ⚠️ <b>IMPORTANTE:</b> Tené listos los documentos marcados. Al finalizar, deberás enviar tu <b>ubicación en tiempo real</b> (Casa y Trabajo) vía WhatsApp cuando el asesor lo solicite.
                    </div>

                    <button class="btn btn-whatsapp" onclick="enviarFinal()">FINALIZAR Y ENVIAR</button>
                    <button class="btn btn-back" onclick="irA(3)">← Volver al perfil</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "595992271485";
        const GOOGLE_URL = "TU_URL_DE_APPS_SCRIPT";

        const REQUISITOS_ORIGINALES = {
            formal_ips: ["6 meses aportes IPS", "Liquidación de salario"],
            formal_iva: ["6 meses de IVAs", "6 facturas emitidas"],
            informal: ["Certificado de trabajo", "6 meses antigüedad mínima"],
            publico_perm: ["Cédula vigente", "Liquidación (1 mes antigüedad)"],
            publico_cont: ["Liquidación (15 meses antigüedad)"],
            micro_iva: ["18 meses con IVA", "Fotos del negocio", "Fotos mercadería"],
            micro_patente: ["18 meses con Patente", "Patente al día", "Fotos negocio"],
            micro_sin_pat: ["24 meses demostrables", "Fotos local y mercadería"],
            prof_indep: ["Título Universitario", "Registro Profesional", "6 últimos IVAs"]
        };

        const CUOTERO = {
            1000000: [235000, 182000, 150000, 127000, 112000, 101000, 96000, 90000],
            2000000: [465000, 358000, 292500, 254000, 223000, 201000, 191000, 177000],
            3000000: [685000, 535000, 435000, 380000, 334000, 302000, 287000, 266000],
            4000000: [900000, 700000, 571000, 507000, 445000, 402000, 382000, 354000],
            5000000: [1150000, 885000, 712000, 633000, 555000, 503000, 478000, 443000]
        };

        let seleccion = { monto: 0, cuota: '', plazo: '' };

        // Formateador de puntos
        document.querySelectorAll('.format-mil').forEach(inp => {
            inp.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, "");
                e.target.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            });
        });

        function actualizarTabla() {
            const m = document.getElementById('montoSimulador').value;
            if(!m) return;
            document.getElementById('tablaCont').style.display = 'block';
            const cuotas = CUOTERO[m];
            const plazos = [6, 8, 10, 12, 15, 18, 20, 24];
            let html = "<tr>";
            cuotas.forEach((c, i) => html += `<td onclick="selCuota(this, '${m}', '${c}', '${plazos[i]}')">${c.toLocaleString()}</td>`);
            document.getElementById('cuerpoTabla').innerHTML = html + "</tr>";
        }

        function selCuota(el, m, c, p) {
            document.querySelectorAll('td').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            seleccion = { monto: m, cuota: c, plazo: p };
            document.getElementById('txtCuota').innerText = `${p} cuotas de ${parseInt(c).toLocaleString()} Gs.`;
            document.getElementById('resultadoSim').style.display = 'block';
        }

        function irA(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function validarPaso2() {
            if(document.getElementById('nombre').value.length < 5 || document.getElementById('ci').value.length < 5) { alert("Complete sus datos."); return; }
            irA(3);
        }

        function mostrarPerfilesOriginales() {
            const p = document.getElementById('perfil').value;
            const checkCont = document.getElementById('checklistCont');
            const empCont = document.getElementById('seccionEmpresa');
            if(!p) { checkCont.style.display='none'; empCont.style.display='none'; return; }
            
            checkCont.style.display='block';
            empCont.style.display='block';
            document.getElementById('listaCheck').innerHTML = REQUISITOS_ORIGINALES[p].map(r => `<div class="check-item"><input type="checkbox" checked> ${r}</div>`).join('');
        }

        function checkOtraCiudad() {
            const s = document.getElementById('ciudadSel').value;
            document.getElementById('otraCiudad').style.display = (s === 'OTRA') ? 'block' : 'none';
        }

        function validarPaso3() {
            if(!document.getElementById('perfil').value || !document.getElementById('razonSocial').value) { alert("Complete los datos laborales."); return; }
            irA(4);
        }

        function enviarFinal() {
            const ciudad = (document.getElementById('ciudadSel').value === 'OTRA') ? document.getElementById('otraCiudad').value : document.getElementById('ciudadSel').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                ci: document.getElementById('ci').value,
                telefono: document.getElementById('tel').value,
                ingreso: document.getElementById('ingreso').value,
                perfil: document.getElementById('perfil').options[document.getElementById('perfil').selectedIndex].text,
                empresa: document.getElementById('razonSocial').value,
                dir_lab: `${document.getElementById('labCalle').value}, ${document.getElementById('labNum').value}, ${document.getElementById('labBarrio').value}`,
                ciudad: ciudad,
                dir_casa: `${document.getElementById('casaCalle').value}, ${document.getElementById('casaNum').value}, ${document.getElementById('casaBarrio').value}`,
                referencias: `1. ${document.getElementById('ref1').value} | 2. ${document.getElementById('ref2').value} | 3. ${document.getElementById('ref3').value}`,
                cuota: `${seleccion.plazo} cuotas de ${seleccion.cuota}`
            };

            if(!data.dir_casa || !document.getElementById('ref3').value) { alert("Complete todos los campos."); return; }

            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            const msg = `¡Hola Isidro! Evaluación enviada:\n*Cliente:* ${data.nombre}\n*CI:* ${data.ci}\n*Perfil:* ${data.perfil}\n*Empresa:* ${data.empresa}\n*Cuota:* ${data.cuota}\n*Ciudad:* ${data.ciudad}\n\n*Docs y Ubicación listos para enviar.*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        }
    </script>
</body>
</html>
