<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isidro Cabrera · App Principal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230B0F19'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%232ECC71' font-family='Arial' font-weight='bold'>IC</text></svg>">
    <style>
        :root { --bg: #0B0F19; --accent: #2ECC71; --white: #fff; --error: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 50px; }
        h3 { color: var(--accent); margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #1A1D2E; color: white; font-size: 14px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: rgba(46, 204, 113, 0.2); color: var(--accent); border: 1px solid var(--accent); }
        .btn-wa { background: #25D366; color: white; }
        .step { display: none; }
        .step.active { display: block; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .check-item input { width: 20px; }
        .notice { background: rgba(46,204,113,0.1); padding: 15px; border-radius: 12px; font-size: 12px; line-height: 1.5; color: var(--accent); border: 1px dashed var(--accent); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="step active" id="step1">
                <h3>Identificación</h3>
                <div class="form-group">
                    <label>Número de Cédula</label>
                    <input type="text" id="ci" class="format-mil" placeholder="Ej: 1.234.567">
                    <p id="ciAlert" style="color:var(--error); font-size:10px; margin-top:5px; display:none;">Has superado el límite de intentos hoy.</p>
                </div>
                <button class="btn btn-primary" onclick="validarCI()">SIGUIENTE</button>
            </div>

            <div class="step" id="step2">
                <h3>Simulador de Cuotas</h3>
                <select id="monto" onchange="verCuotas()">
                    <option value="">Seleccione Monto...</option>
                    <option value="1000000">1.000.000 Gs</option>
                    <option value="2000000">2.000.000 Gs</option>
                    <option value="3000000">3.000.000 Gs</option>
                    <option value="4000000">4.000.000 Gs</option>
                    <option value="5000000">5.000.000 Gs</option>
                </select>
                <div id="cuoteroCont" style="margin-top:15px; font-size:11px; text-align:center;"></div>
                <button class="btn btn-primary" id="btnS2" style="display:none;" onclick="irA(3)">CONTINUAR</button>
            </div>

            <div class="step" id="step3">
                <h3>Perfil Laboral</h3>
                <div class="form-group"><label>Nombre y Apellido</label><input type="text" id="nombre"></div>
                <div class="form-group"><label>WhatsApp</label><input type="tel" id="tel"></div>
                <div class="form-group"><label>Ingreso Mensual</label><input type="text" id="ingreso" class="format-mil"></div>
                
                <div class="form-group">
                    <label>Perfil</label>
                    <select id="perfil" onchange="cargarRequisitos()">
                        <option value="">Seleccione...</option>
                        <option value="ips">Trabajador Formal (IPS)</option>
                        <option value="iva">Trabajador Formal (IVA)</option>
                        <option value="informal">Informal (Sin IPS)</option>
                        <option value="pub_perm">Público Permanente</option>
                        <option value="pub_cont">Público Contratado</option>
                        <option value="micro_iva">Micro con IVA</option>
                        <option value="micro_pat">Micro con Patente</option>
                        <option value="micro_sin">Micro sin Patente</option>
                        <option value="pro">Profesional Indep.</option>
                    </select>
                </div>

                <div id="camposExtra" style="display:none;">
                    <div class="form-group"><label>Empresa / Razón Social</label><input type="text" id="razon"></div>
                    <label>Ubicación Laboral</label>
                    <div class="row">
                        <input type="text" id="labCalle" placeholder="Calle">
                        <input type="text" id="labNum" placeholder="N°">
                    </div>
                    <input type="text" id="labBarrio" placeholder="Barrio" style="margin-top:5px;">
                </div>

                <div id="reqCont" style="display:none; margin-top:15px;">
                    <label style="color:var(--accent)">Marque los documentos que TIENE:</label>
                    <div id="listaReq"></div>
                </div>
                <button class="btn btn-primary" onclick="irA(4)" style="margin-top:20px;">SIGUIENTE</button>
            </div>

            <div class="step" id="step4">
                <h3>Ubicación Casa y Referencias</h3>
                <div class="form-group">
                    <label>Ciudad</label>
                    <select id="ciudad" onchange="otroC()">
                        <option value="Pedro Juan Caballero">Pedro Juan Caballero</option>
                        <option value="Asunción">Asunción</option>
                        <option value="Ciudad del Este">Ciudad del Este</option>
                        <option value="OTRA">-- OTRA --</option>
                    </select>
                    <input type="text" id="otraC" placeholder="Nombre de ciudad" style="display:none; margin-top:5px;">
                </div>
                <div class="row">
                    <input type="text" id="casaCalle" placeholder="Calle Casa">
                    <input type="text" id="casaNum" placeholder="N°">
                </div>
                <input type="text" id="casaBarrio" placeholder="Barrio" style="margin-top:5px;">

                <h3 style="margin-top:20px;">3 Referencias Personales</h3>
                <input type="text" id="ref1" placeholder="Ref 1: Nombre Apellido y Cel" style="margin-bottom:5px;">
                <input type="text" id="ref2" placeholder="Ref 2: Nombre Apellido y Cel" style="margin-bottom:5px;">
                <input type="text" id="ref3" placeholder="Ref 3: Nombre Apellido y Cel">

                <div class="notice">
                    📌 <b>PASO FINAL:</b> Tenga listos sus documentos. Al enviar, deberá proveer la <b>ubicación GPS</b> de su casa y trabajo cuando el asesor lo solicite vía WhatsApp.
                </div>
                <button class="btn btn-wa" onclick="finalizar()">ENVIAR TODO POR WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        const WA_NUM = "595992271485";
        const G_URL = "TU_URL_DE_APPS_SCRIPT";
        
        // --- BLOQUEO POR CI ---
        function validarCI() {
            const ci = document.getElementById('ci').value.replace(/\D/g,'');
            if(ci.length < 5) return alert("Cédula inválida");
            
            let intentos = JSON.parse(localStorage.getItem('ci_intentos') || "{}");
            intentos[ci] = (intentos[ci] || 0) + 1;
            
            if(intentos[ci] > 2) {
                document.getElementById('ciAlert').style.display = 'block';
                return;
            }
            localStorage.setItem('ci_intentos', JSON.stringify(intentos));
            irA(2);
        }

        // --- FORMATEO ---
        document.querySelectorAll('.format-mil').forEach(inp => {
            inp.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, "");
                e.target.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            });
        });

        // --- PERFILES Y REQUISITOS ORIGINALES ---
        const REQUISITOS = {
            ips: ["Aportes IPS (6 meses)", "Liquidación de salario"],
            iva: ["IVAs (6 meses)", "Facturas emitidas"],
            informal: ["Certificado laboral", "6 meses antigüedad"],
            pub_perm: ["Cédula", "Liquidación (1 mes antig.)"],
            pub_cont: ["Liquidación (15 meses antig.)"],
            micro_iva: ["IVA (18 meses)", "Fotos Negocio", "Fotos Mercadería"],
            micro_pat: ["Patente Comercial", "Fotos Negocio"],
            micro_sin: ["24 meses demostrables", "Fotos Local y Mercadería"],
            pro: ["Título Universitario", "Registro Prof.", "IVAs (6 meses)"]
        };

        function cargarRequisitos() {
            const p = document.getElementById('perfil').value;
            const cont = document.getElementById('reqCont');
            const lista = document.getElementById('listaReq');
            const extra = document.getElementById('camposExtra');
            
            if(!p) return cont.style.display='none';
            cont.style.display='block';
            extra.style.display='block'; // Siempre pedimos datos laborales

            lista.innerHTML = REQUISITOS[p].map(r => `
                <div class="check-item"><input type="checkbox" class="doc-check" value="${r}"> ${r}</div>
            `).join('');
        }

        // --- SIMULADOR ---
        const CUOTAS = {
            1000000: "127.000", 2000000: "254.000", 3000000: "380.000", 4000000: "507.000", 5000000: "633.000"
        };
        let seleccion = "";
        function verCuotas() {
            const m = document.getElementById('monto').value;
            if(!m) return;
            seleccion = `12 cuotas de ${CUOTAS[m]} Gs.`;
            document.getElementById('cuoteroCont').innerHTML = `<b style="color:var(--accent)">${seleccion}</b>`;
            document.getElementById('btnS2').style.display = 'block';
        }

        function irA(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }

        function otroC() {
            document.getElementById('otraC').style.display = (document.getElementById('ciudad').value === 'OTRA') ? 'block' : 'none';
        }

        // --- ENVÍO FINAL ---
        function finalizar() {
            const docs_marcados = Array.from(document.querySelectorAll('.doc-check:checked')).map(c => c.value);
            const docs_faltantes = Array.from(document.querySelectorAll('.doc-check:not(:checked)')).map(c => c.value);
            
            const data = {
                nombre: document.getElementById('nombre').value,
                ci: document.getElementById('ci').value,
                whatsapp: document.getElementById('tel').value,
                ingreso: document.getElementById('ingreso').value,
                perfil: document.getElementById('perfil').value,
                razon_social: document.getElementById('razon').value,
                dir_laboral: `${document.getElementById('labCalle').value} ${document.getElementById('labNum').value}, ${document.getElementById('labBarrio').value}`,
                ciudad: document.getElementById('ciudad').value === 'OTRA' ? document.getElementById('otraC').value : document.getElementById('ciudad').value,
                dir_casa: `${document.getElementById('casaCalle').value} ${document.getElementById('casaNum').value}, ${document.getElementById('casaBarrio').value}`,
                referencias: `${document.getElementById('ref1').value} | ${document.getElementById('ref2').value} | ${document.getElementById('ref3').value}`,
                simulacion: seleccion,
                tiene: docs_marcados.join(", "),
                falta: docs_faltantes.join(", ")
            };

            // Enviar a Google Sheet
            fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            // Mensaje WhatsApp COMPLETO
            const msg = `*SOLICITUD DE CRÉDITO - ISIDRO CABRERA*\n\n` +
                        `*CLIENTE:* ${data.nombre}\n` +
                        `*CI:* ${data.ci}\n` +
                        `*WHATSAPP:* ${data.whatsapp}\n` +
                        `*INGRESO:* ${data.ingreso}\n` +
                        `*PERFIL:* ${data.perfil}\n` +
                        `*EMPRESA:* ${data.razon_social}\n` +
                        `*DIR. LABORAL:* ${data.dir_laboral}\n` +
                        `*CIUDAD:* ${data.ciudad}\n` +
                        `*DIR. CASA:* ${data.dir_casa}\n\n` +
                        `*SIMULACIÓN:* ${data.simulacion}\n\n` +
                        `*DOCS QUE TIENE:*\n✅ ${data.tiene || 'Ninguno'}\n\n` +
                        `*DOCS FALTANTES:*\n❌ ${data.falta || 'Ninguno'}\n\n` +
                        `*REFS:* ${data.referencias}`;

            window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
