<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isidro Cabrera · Sistema de Evaluación</title>
    <style>
        :root {
            --bg-deep: #0B0F19; --accent-gold: #2ECC71; --white: #ffffff;
            --whatsapp: #25D366; --error: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-deep); min-height: 100vh; padding: 10px;
            display: flex; justify-content: center; align-items: flex-start;
        }
        .container { width: 100%; max-width: 500px; }
        .app-card {
            background: rgba(255,255,255,0.02); border-radius: 25px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); margin-bottom: 50px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08);
        }
        .header { padding: 30px 20px; color: white; text-align: center; border-bottom: 1px solid rgba(46, 204, 113, 0.4); }
        .header .logo { font-size: 24px; font-weight: 800; }
        .header .logo span { color: var(--accent-gold); }
        
        .content { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 5px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; }
        .required { color: var(--error); }

        /* Corrección de visibilidad en Select e Inputs */
        input, select, textarea {
            width: 100%; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            font-size: 14px; background: #1A1D2E; color: var(--white); transition: 0.2s;
        }
        option { background: #1A1D2E; color: white; }
        input:focus { border-color: var(--accent-gold); outline: none; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-primary { background: rgba(46, 204, 113, 0.15); color: var(--accent-gold); border: 1px solid rgba(46, 204, 113, 0.3); }
        .btn-whatsapp { background: var(--whatsapp); color: white; text-decoration: none; display: block; text-align: center; }

        /* Estilo de Tabla */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; background: rgba(255,255,255,0.01); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 550px; }
        th { background: rgba(46, 204, 113, 0.1); padding: 12px; color: var(--accent-gold); }
        td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: white; }
        td.selected { background: var(--accent-gold); color: var(--bg-deep); font-weight: 800; }

        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .checklist-container { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.08); }
        .checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 12px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .checklist-item input { width: auto; }
        
        .doc-reminder { background: rgba(46, 204, 113, 0.05); border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 10px; padding: 10px; margin-top: 8px; font-size: 11px; color: var(--accent-gold); text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header">
                <div class="logo">ISIDRO <span>CABRERA</span></div>
            </div>

            <div class="content">
                <div class="step-content active" id="step1">
                    <label>Monto a Simular (Gs.)</label>
                    <select id="montoSimulador" onchange="actualizarTabla()">
                        <option value="">Seleccione monto...</option>
                        <option value="1000000">1.000.000 Gs</option>
                        <option value="2000000">2.000.000 Gs</option>
                        <option value="3000000">3.000.000 Gs</option>
                        <option value="4000000">4.000.000 Gs</option>
                        <option value="5000000">5.000.000 Gs</option>
                    </select>

                    <div class="table-container" id="tablaCont" style="display:none;">
                        <table>
                            <thead><tr><th>6 cuotas</th><th>8 cuotas</th><th>10 cuotas</th><th>12 cuotas</th><th>15 cuotas</th><th>18 cuotas</th><th>20 cuotas</th><th>24 cuotas</th></tr></thead>
                            <tbody id="cuerpoTabla"></tbody>
                        </table>
                    </div>
                    <div id="resultadoSim" style="display:none; text-align:center; margin-top:20px;">
                        <h3 id="txtCuota" style="color:var(--accent-gold); font-size:24px; margin-bottom:15px;"></h3>
                        <button class="btn btn-primary" onclick="irA(2)">EMPEZAR EVALUACIÓN</button>
                    </div>
                </div>

                <div class="step-content" id="step2">
                    <div class="form-group"><label>Nombre y Apellido Completos <span class="required">*</span></label>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required></div>
                    
                    <div class="row-2">
                        <div class="form-group"><label>Cédula N° <span class="required">*</span></label>
                            <input type="text" id="ci" class="format-mil" placeholder="1.234.567" required></div>
                        <div class="form-group"><label>WhatsApp <span class="required">*</span></label>
                            <input type="tel" id="tel" placeholder="0971 123 456" required></div>
                    </div>

                    <div class="form-group"><label>Ingreso Mensual (Gs) <span class="required">*</span></label>
                        <input type="text" id="ingreso" class="format-mil" placeholder="3.500.000" required></div>

                    <div class="form-group"><label>Perfil Laboral <span class="required">*</span></label>
                        <select id="perfil" onchange="actualizarRequisitos()">
                            <option value="">Seleccione su perfil...</option>
                            <option value="formal_ips">Trabajador Formal (IPS)</option>
                            <option value="formal_iva">Trabajador Formal (IVA)</option>
                            <option value="informal">Trabajador Informal (Sin IPS)</option>
                            <option value="publico_perm">Funcionario Público Permanente</option>
                            <option value="publico_cont">Funcionario Público Contratado</option>
                            <option value="micro_iva">Microempresa con IVA</option>
                            <option value="micro_patente">Microempresa con Patente</option>
                            <option value="micro_sin_pat">Microempresa sin Patente</option>
                            <option value="prof_indep">Profesional Independiente</option>
                        </select>
                    </div>

                    <div id="requisitosCont" class="checklist-container" style="display:none;">
                        <label style="color:var(--accent-gold)">Documentos que posee:</label>
                        <div id="listaChecklist"></div>
                    </div>

                    <button class="btn btn-primary" onclick="validarPaso2()">SIGUIENTE</button>
                </div>

                <div class="step-content" id="step3">
                    <div class="form-group"><label>Ciudad <span class="required">*</span></label>
                        <input type="text" id="ciudad" list="ciudadesPy" placeholder="PJC, Asunción, CDE...">
                        <datalist id="ciudadesPy">
                            <option value="Pedro Juan Caballero (PJC)">
                            <option value="Asunción">
                            <option value="Ciudad del Este">
                            <option value="Encarnación">
                            <option value="Luque">
                        </datalist>
                    </div>

                    <label>Dirección Particular <span class="required">*</span></label>
                    <div class="form-group"><input type="text" id="calle" placeholder="Calle"></div>
                    <div class="row-2">
                        <div class="form-group"><input type="text" id="num_casa" placeholder="Número"></div>
                        <div class="form-group"><input type="text" id="barrio" placeholder="Barrio"></div>
                    </div>

                    <label>Referencias Personales (Nombre, Apellido y Cel) <span class="required">*</span></label>
                    <div class="form-group"><textarea id="ref1" placeholder="Ref 1: Nombre Apellido - 09xx" rows="2"></textarea></div>
                    <div class="form-group"><textarea id="ref2" placeholder="Ref 2: Nombre Apellido - 09xx" rows="2"></textarea></div>

                    <button class="btn btn-whatsapp" onclick="enviarFinal()">FINALIZAR Y ENVIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "595992271485";
        const GOOGLE_URL = "TU_URL_DE_APPS_SCRIPT";

        const PERFILES = {
            formal_ips: ["6 meses aportes IPS", "Liquidación de salario"],
            formal_iva: ["6 meses de IVA", "Facturas emitidas"],
            informal: ["Certificado de trabajo", "6 meses antigüedad"],
            publico_perm: ["Cédula", "Liquidación"],
            publico_cont: ["15 meses antigüedad"],
            micro_iva: ["18 meses antigüedad", "6 últimos IVAs", "Fotos del negocio"],
            micro_patente: ["Patente actual", "Fotos mercadería"],
            micro_sin_pat: ["24 meses demostrables", "Fotos local"],
            prof_indep: ["Título universitario", "6 últimos IVAs"]
        };

        const CUOTERO = {
            1000000: [235000, 182000, 150000, 127000, 112000, 101000, 96000, 90000],
            2000000: [465000, 358000, 292500, 254000, 223000, 201000, 191000, 177000],
            3000000: [685000, 535000, 435000, 380000, 334000, 302000, 287000, 266000],
            4000000: [900000, 700000, 571000, 507000, 445000, 402000, 382000, 354000],
            5000000: [1150000, 885000, 712000, 633000, 555000, 503000, 478000, 443000]
        };

        let seleccion = { monto: 0, cuota: '', plazo: '' };

        // Formateador de puntos de mil
        document.querySelectorAll('.format-mil').forEach(inp => {
            inp.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, "");
                e.target.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            });
        });

        function actualizarTabla() {
            const m = document.getElementById('montoSimulador').value;
            if(!m) return;
            document.getElementById('tablaCont').style.display = 'block';
            const cuotas = CUOTERO[m];
            const plazos = [6, 8, 10, 12, 15, 18, 20, 24];
            let html = "<tr>";
            cuotas.forEach((c, i) => {
                html += `<td onclick="seleccionar(this, '${m}', '${c}', '${plazos[i]}')">${c.toLocaleString()}</td>`;
            });
            document.getElementById('cuerpoTabla').innerHTML = html + "</tr>";
        }

        function seleccionar(el, m, c, p) {
            document.querySelectorAll('td').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            seleccion = { monto: m, cuota: c, plazo: p };
            document.getElementById('txtCuota').innerText = `${p} cuotas de ${parseInt(c).toLocaleString()} Gs.`;
            document.getElementById('resultadoSim').style.display = 'block';
        }

        function actualizarRequisitos() {
            const p = document.getElementById('perfil').value;
            const cont = document.getElementById('requisitosCont');
            const lista = document.getElementById('listaChecklist');
            if(!p) { cont.style.display='none'; return; }
            cont.style.display='block';
            lista.innerHTML = PERFILES[p].map(r => `<div class="checklist-item"><input type="checkbox" checked> ${r}</div>`).join('');
        }

        function irA(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function validarPaso2() {
            const n = document.getElementById('nombre').value;
            const c = document.getElementById('ci').value;
            const t = document.getElementById('tel').value;
            if(n.length < 5 || c.length < 5 || t.length < 9) { alert("Complete sus datos correctamente."); return; }
            irA(3);
        }

        function enviarFinal() {
            const data = {
                nombre: document.getElementById('nombre').value,
                ci: document.getElementById('ci').value,
                telefono: document.getElementById('tel').value,
                ingreso: document.getElementById('ingreso').value,
                perfil: document.getElementById('perfil').options[document.getElementById('perfil').selectedIndex].text,
                ciudad: document.getElementById('ciudad').value,
                direccion: `${document.getElementById('calle').value}, ${document.getElementById('num_casa').value}, ${document.getElementById('barrio').value}`,
                referencias: `Ref1: ${document.getElementById('ref1').value} | Ref2: ${document.getElementById('ref2').value}`,
                cuota: `${seleccion.plazo} cuotas de ${seleccion.cuota}`
            };

            if(!data.ciudad || !document.getElementById('calle').value || !document.getElementById('ref1').value) {
                alert("Por favor, complete todos los campos obligatorios."); return;
            }

            // Enviar a Sheets
            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            // Mensaje WhatsApp
            const msg = `¡Hola Isidro! Envío mi evaluación:\n\n*Cliente:* ${data.nombre}\n*CI:* ${data.ci}\n*Perfil:* ${data.perfil}\n*Ingreso:* ${data.ingreso} Gs\n*Cuota:* ${data.cuota}\n*Ciudad:* ${data.ciudad}\n*Dirección:* ${data.direccion}\n*Refs:* ${data.referencias}`;
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            location.reload();
        }
    </script>
</body>
</html>
